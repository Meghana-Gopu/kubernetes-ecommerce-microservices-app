apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend-container

          image: 992382394001.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:3676f13683b84fd6790140476a1c3c51ee56ac1d

          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: backend-config

---

apiVersion: v1
kind: Service
metadata:
  name: backend-service

spec:
  selector:
    app: backend

  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000

  type: ClusterIP
