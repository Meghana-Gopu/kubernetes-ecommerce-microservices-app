name: CI/CD for Shopping Site (Frontend + Backend)

on:
  workflow_dispatch:

  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1

  # IMPORTANT:
  # Store ONLY account number in GitHub Secret:
  # AWS_ACCOUNT_ID=694767481922
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

  FRONTEND_SERVICES: "main appliances auto beauty books computers earphones electronics fashion food furniture googlegrocery googlemusic googlepay home mobiles sports toys two-wheelers"

permissions:
  contents: write

jobs:
  deploy:

    # Prevent infinite CI loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    runs-on: ubuntu-latest

    steps:

      # -----------------------------------
      # Checkout Repository
      # -----------------------------------
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}

      # -----------------------------------
      # Configure AWS Credentials
      # -----------------------------------
      - name: 🔧 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -----------------------------------
      # Login to ECR
      # -----------------------------------
      - name: 🔐 Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # -----------------------------------
      # Build & Push Frontend Images
      # -----------------------------------
      - name: 🚀 Build and Push Frontend Images
        run: |
          set -e

          IMAGE_TAG="${GITHUB_SHA}"

          for service in $FRONTEND_SERVICES; do

            FOLDER="frontend/$service"
            REPO_NAME="shopping-site-$service"
            IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

            echo "----------------------------------------"
            echo "Processing frontend service: $service"
            echo "----------------------------------------"

            # Skip if Dockerfile missing
            if [ ! -f "$FOLDER/Dockerfile" ]; then
              echo "⚠️ Dockerfile not found in $FOLDER"
              continue
            fi

            # Create ECR repo if not exists
            aws ecr describe-repositories \
              --repository-names "$REPO_NAME" \
              >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name "$REPO_NAME" \
              --image-scanning-configuration scanOnPush=true

            # Build image
            docker build -t "$IMAGE_URI" "$FOLDER"

            # Push image
            docker push "$IMAGE_URI"

            # Update deployment YAML
            if [ -f "$FOLDER/deployment.yml" ]; then
              sed -i "/image:/c\          image: $IMAGE_URI" "$FOLDER/deployment.yml"
              echo "✅ Updated $FOLDER/deployment.yml"
            else
              echo "⚠️ deployment.yml not found for $service"
            fi

          done

      # -----------------------------------
      # Build & Push Backend Image
      # -----------------------------------
      - name: 🚀 Build and Push Backend Image
        run: |
          set -e

          IMAGE_TAG="${GITHUB_SHA}"

          FOLDER="backend"
          REPO_NAME="shopping-site-backend"
          IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

          echo "----------------------------------------"
          echo "Processing backend service"
          echo "----------------------------------------"

          # Create ECR repo if not exists
          aws ecr describe-repositories \
            --repository-names "$REPO_NAME" \
            >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "$REPO_NAME" \
            --image-scanning-configuration scanOnPush=true

          # Build image
          docker build -t "$IMAGE_URI" "$FOLDER"

          # Push image
          docker push "$IMAGE_URI"

          # Update backend deployment YAML
          if [ -f "$FOLDER/backend-deployment.yml" ]; then
            sed -i "/image:/c\          image: $IMAGE_URI" "$FOLDER/backend-deployment.yml"
            echo "✅ Updated backend deployment YAML"
          else
            echo "❌ backend/backend-deployment.yml not found"
            exit 1
          fi

      # -----------------------------------
      # Commit Updated YAML Files
      # -----------------------------------
      - name: 🔄 Commit Updated Kubernetes YAML Files
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add frontend/**/deployment.yml
          git add backend/backend-deployment.yml

          git commit -m "🔄 Update Kubernetes image tags [skip ci]" || echo "No changes to commit"

          git push origin main
