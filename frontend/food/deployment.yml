apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-deployment
  labels:
    app: food
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food
  template:
    metadata:
      labels:
        app: food
    spec:
      containers:
      - name: food
        image: 992382394001.dkr.ecr.us-east-1.amazonaws.com/shopping-site-food:3676f13683b84fd6790140476a1c3c51ee56ac1d
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: food-service
  labels:
    app: food
spec:
  type: ClusterIP
  selector:
    app: food
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
